<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz de Cultura Geral - Descobre Aveiro!</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://fav.farm/⛵" />
  </head>
  <body
    class="bg-dark d-flex align-items-center justify-content-center"
    style="min-height: 100vh"
  >
    <div class="container" style="max-width: 600px">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div
          class="card-header bg-primary text-white text-center py-4 border-0"
        >
          <span class="material-icons display-5">sailing</span>
          <h3 class="fw-bold mb-0 mt-2">Desafio Aveirense</h3>
          <p class="mb-0 small text-white text-opacity-75">
            Será que conheces mesmo a Veneza Portuguesa?
          </p>
        </div>

        <div class="progress rounded-0" style="height: 6px">
          <div
            id="barraProgresso"
            class="progress-bar bg-warning"
            style="width: 0%"
          ></div>
        </div>

        <div class="card-body p-4 text-center" id="ecranJogo">
          <h4 id="perguntaTexto" class="fw-bold text-dark mb-4">
            A carregar pergunta...
          </h4>

          <div id="zonaOpcoes" class="d-grid gap-3"></div>
        </div>

        <div class="card-body p-5 text-center d-none" id="ecranFim">
          <span class="material-icons text-warning display-1 mb-3"
            >emoji_events</span
          >
          <h2 class="fw-bold text-dark mb-2">Quiz Concluído!</h2>
          <p class="lead text-secondary mb-4" id="pontuacaoTexto">
            Tu acertaste X de Y perguntas.
          </p>
          <button
            onclick="reiniciarJogo()"
            class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow"
          >
            Jogar Novamente
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
