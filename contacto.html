<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="img/favicon-svg.svg" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html" class="logo">Código e Café 🧑‍💻☕ </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="servicos.html">Serviços</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="contacto-container">
        <form action="https://formsubmit.co/raphaelmellogarrido@gmail.com" method="POST" class="formulario-contacto" id="form-contacto">
          <input type="hidden" name="_subject" value="Mensagem recebida de Código e Café" />

          <input type="hidden" name="_honey" style="display: none" />
          <input type="hidden" name="_template" value="box" />

          <h2 class="titulo-formulario">Entre em Contacto</h2>

          <input type="hidden" name="Informação" value="Alguem submeteu uma mensagem no formulário Código e Café. Confira a mensagem:" />

          <div class="grupo-campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />
          </div>

          <div class="grupo-campo">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required />
          </div>

          <div class="grupo-campo">
            <label for="tlmv">Tlmv:</label>
            <input type="tel" id="tlmv" name="tlmv" placeholder="912 345 678" required />
          </div>

          <div class="grupo-campo">
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva aqui a sua mensagem..." required></textarea>
          </div>

          <button type="submit" class="botao-enviar">Enviar Mensagem</button>
        </form>

        <div id="mensagem-sucesso" style="display: none">
          <h3>Mensagem enviada com sucesso! 🧑‍💻☕</h3>
          <p>Obrigado pelo contacto! Responderemos o mais breve possível!</p>
        </div>
      </section>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    </main>

    <footer id="main-footer">
      <p>&copy; 2026 Código e Café. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
